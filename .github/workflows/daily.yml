name: daily-twitter-scrape

on:
  schedule:
    - cron: "0 1 * * *"  # 매일 실행
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - run: python main.py

      - uses: actions/upload-artifact@v4
        with:
          name: tweets
          path: tweets.csv
